<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dovux War Panel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>DOVUX<br><span>WAR PANEL</span></h1>
      <nav>
        <button class="active">Panel</button>
        <button>Territorios</button>
        <button>Graffitis</button>
        <button>Estadísticas</button>
        <button>Configuración</button>
      </nav>
    </aside>
    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">SixNine · Dovux Life</p>
          <h2>Centro táctico de territorios</h2>
        </div>
        <div class="turno">
          <span>Próximo turno</span>
          <strong id="nextTurn">--:--</strong>
          <small id="countdown">calculando...</small>
        </div>
      </header>
      <section class="stats">
        <article><span>Mantener</span><strong id="statMaintain">0</strong></article>
        <article><span>Conquistar</span><strong id="statConquer">0</strong></article>
        <article><span>Ignorar</span><strong id="statIgnore">0</strong></article>
        <article><span>Graffitis</span><strong id="statGraffiti">0</strong></article>
      </section>
      <section class="grid">
        <div class="map-card">
          <div class="map-placeholder">
            <div class="radar"></div>
            <p>Mapa táctico<br><span>Próxima versión: territorios clicables</span></p>
          </div>
        </div>
        <div class="commander">
          <h3>🧠 Comandante</h3>
          <p id="recommendation">Cargando recomendación...</p>
          <button id="addTest">+ Registrar graffiti de prueba</button>
        </div>
      </section>
      <section>
        <h3>Territorios</h3>
        <div id="territoryList" class="territory-list"></div>
      </section>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
