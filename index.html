<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0c12" />
  <title>FactionOS</title>
  <link rel="stylesheet" href="./css/styles-v1.4.0.css?v=1.4.2" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <div class="brand-mark">F</div>
        <div class="brand-copy">
          <strong>FactionOS</strong>
          <span id="workspaceLabel">Workspace</span>
        </div>
        <button class="icon-btn sidebar-collapse" id="sidebarToggle" aria-label="Contraer menú">☰</button>
      </div>

      <div class="workspace-card">
        <span class="eyebrow">Workspace activo</span>
        <strong id="sidebarWorkspace">Organización</strong>
        <small id="sidebarServer">Servidor</small>
      </div>

      <nav class="nav-list" aria-label="Navegación principal">
        <button class="nav-item active" data-view="dashboard"><span>⌂</span><b>Dashboard</b></button>
        <div class="nav-section">Operaciones</div>
        <button class="nav-item" data-view="operations"><span>◎</span><b>Territorios</b></button>
        <button class="nav-item" data-view="graffiti"><span>◉</span><b>Graffitis</b></button>
        <button class="nav-item" data-view="criminal"><span>◆</span><b>Actos delictivos</b></button>
        <div class="nav-section">Logística</div>
        <button class="nav-item" data-view="business"><span>◇</span><b>Negocios</b></button>
        <button class="nav-item" data-view="logistics"><span>▣</span><b>Propiedades</b></button>
        <div class="nav-section">Gestión</div>
        <button class="nav-item" data-view="events"><span>◷</span><b>Eventos</b></button>
        <button class="nav-item" data-view="members"><span>👥</span><b>Miembros</b></button>
        <button class="nav-item" data-view="builder"><span>⌁</span><b>Builder</b></button>
        <button class="nav-item" data-view="settings"><span>⚙</span><b>Ajustes</b></button>
      </nav>

      <div class="sidebar-footer">
        <span>FactionOS v1.4.2 · Reinicio territorial</span>
        <div class="footer-actions">
          <button id="exportBtn">Exportar</button>
          <label>Importar<input id="importInput" type="file" accept="application/json" hidden /></label>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <span class="eyebrow" id="viewKicker">Centro de operaciones</span>
          <h1 id="viewTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <button class="search-button" id="globalSearchBtn">⌘ Buscar <kbd>Ctrl K</kbd></button>
          <div class="turn-card">
            <span>Próximo turno</span>
            <strong id="nextTurn">--:--</strong>
            <small id="turnCountdown">--</small>
          </div>
        </div>
      </header>

      <section id="dashboard" class="view active"></section>
      <section id="operations" class="view"></section>
      <section id="graffiti" class="view"></section>
      <section id="criminal" class="view"></section>
      <section id="business" class="view"></section>
      <section id="logistics" class="view"></section>
      <section id="events" class="view"></section>
      <section id="members" class="view"></section>
      <section id="builder" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite"></div>
  <div id="modalHost" class="modal-host hidden"></div>
  <div id="searchPalette" class="command-palette hidden"></div>

  <script type="module" src="./js/app-v1.4.0.js?v=1.4.2"></script>
</body>
</html>
